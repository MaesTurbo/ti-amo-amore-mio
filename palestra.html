<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Palestra 💪</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(to bottom, #ff9a9e, #fad0c4);
  text-align: center;
}

.menu-container {
  position: fixed;
  top: 20px;
  right: 20px;
}

.menu-button {
  background: crimson;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
}

.dropdown {
  opacity: 0;
  transform: translateY(-10px);
  transition: 0.3s;
  pointer-events: none;
  position: absolute;
  right: 0;
  top: 40px;
  background: white;
  border-radius: 8px;
}

.dropdown.show {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}

.dropdown a {
  display: block;
  padding: 10px;
  text-decoration: none;
  color: crimson;
}

h1 {
  margin-top: 100px;
  color: crimson;
}

.container {
  display: flex;
  flex-direction: column;
  align-items: center;
}

#calendar {
  margin-top: 30px;
  display: grid;
  grid-template-columns: repeat(7, 80px);
  gap: 10px;
}

.day {
  background: white;
  padding: 20px 0;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
}

.day.selected {
  background: crimson;
  color: white;
}

.day.done {
  background: lightgreen;
}

#workoutPanel {
  margin-top: 30px;
  background: white;
  padding: 20px;
  border-radius: 10px;
  width: 260px;
}

.hidden {
  display: none;
}

#workoutPanel input {
  width: 80%;
  margin: 5px;
}

button {
  margin-top: 10px;
  padding: 8px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

#saveWorkout {
  background: crimson;
  color: white;
}
</style>
</head>

<body>

<div class="menu-container">
  <button class="menu-button">☰</button>
  <div class="dropdown">
    <a href="index.html">Home</a>
  </div>
</div>

<h1>Alleniamoci insieme 💪❤️</h1>

<div class="container">
  <div id="calendar"></div>

  <div id="workoutPanel" class="hidden">
    <h2>Allenamento</h2>
    <div id="exerciseList"></div>

    <button id="addExercise">+ Aggiungi</button>
    <button id="saveWorkout">Salva</button>
    <button id="resetWorkout">Reset ❌</button>
  </div>
</div>

<script>
const calendar = document.getElementById("calendar");
const exerciseList = document.getElementById("exerciseList");

let selectedDate = null;

const today = new Date();
const year = today.getFullYear();
const month = today.getMonth();

// MENU
const menuBtn = document.querySelector('.menu-button');
const dropdown = document.querySelector('.dropdown');

menuBtn.addEventListener('click', () => {
  dropdown.classList.toggle('show');
});

// CREA CALENDARIO
const daysInMonth = new Date(year, month + 1, 0).getDate();
const firstDay = new Date(year, month, 1).getDay();

for (let i = 0; i < firstDay; i++) {
  calendar.appendChild(document.createElement("div"));
}

for (let d = 1; d <= daysInMonth; d++) {
  const day = document.createElement("div");
  day.classList.add("day");
  day.textContent = d;

  day.addEventListener("click", () => {
    document.querySelectorAll(".day").forEach(el => el.classList.remove("selected"));
    day.classList.add("selected");

    selectedDate = `${year}-${month + 1}-${d}`;

    document.getElementById("workoutPanel").classList.remove("hidden");

    loadExercises();
  });

  calendar.appendChild(day);
}

// CREA INPUT ESERCIZIO
function createExercise(name = "", percent = 0) {
  const div = document.createElement("div");

  div.innerHTML = `
    <select class="exerciseSelect">
      <option value="">Seleziona</option>
      <option value="glutei">Glutei</option>
      <option value="spalle">Spalle</option>
      <option value="schiena">Schiena</option>
      <option value="petto">Petto</option>
      <option value="addome">Addome</option>
      <option value="riscaldamento">Riscaldamento</option>
      <option value="cardio">Cardio</option>
      <option value="corpo libero">Corpo libero</option>
      <option value="yoga">Yoga</option>
      <option value="pilates">Pilates</option>
      <option value="personalizzata">Personalizzata</option>
    </select>

    <input class="customInput hidden" placeholder="Scrivi tu">

    <input type="number" class="percentInput" placeholder="%" value="${percent}">
  `;

  const percentInput = div.querySelector(".percentInput");
  percentInput.addEventListener("input", updateAddButton);

  const select = div.querySelector(".exerciseSelect");
  const customInput = div.querySelector(".customInput");

  // se era già salvato
  if ([
  "glutei","spalle","schiena","petto","addome",
  "riscaldamento","cardio","corpo libero","yoga","pilates"
  ].includes(name)) {
    select.value = name;
  } else {
    select.value = "personalizzata";
    customInput.classList.remove("hidden");
    customInput.value = name;
  }

  // mostra input custom
  select.addEventListener("change", () => {
    if (select.value === "personalizzata") {
      customInput.classList.remove("hidden");
    } else {
      customInput.classList.add("hidden");
    }
  });

  exerciseList.appendChild(div);
}
updateAddButton();
// AGGIUNGI ESERCIZIO
document.getElementById("addExercise").addEventListener("click", () => {
  createExercise();
});

// SALVA
document.getElementById("saveWorkout").addEventListener("click", () => {
  const inputs = exerciseList.querySelectorAll("div");

  let exercises = [];
  let total = 0;


  
  inputs.forEach(div => {
  const select = div.querySelector(".exerciseSelect");
  const custom = div.querySelector(".customInput");
  const percentInput = div.querySelector(".percentInput");

  let name = select.value;

  if (name === "personalizzata") {
    name = custom.value || "personalizzata";
  }

  const percent = parseInt(percentInput.value) || 0;


    
    total += percent;
    exercises.push({ name, percent });
  });

  if (total > 100) {
    alert("Superi il 100%");
    return;
  }

  const data = JSON.parse(localStorage.getItem("workouts")) || {};
  data[selectedDate] = exercises;
  

  localStorage.setItem("workouts", JSON.stringify(data));

  colorDays();

  alert("Salvato 💪");
});

// RESET
document.getElementById("resetWorkout").addEventListener("click", () => {
  if (!selectedDate) return;

  const data = JSON.parse(localStorage.getItem("workouts")) || {};
  delete data[selectedDate];

  localStorage.setItem("workouts", JSON.stringify(data));

  exerciseList.innerHTML = "";
  createExercise();

  updateAddButton();
  
  colorDays();

  alert("Reset fatto");
});

// CARICA ESERCIZI
function loadExercises() {
  exerciseList.innerHTML = "";

  const data = JSON.parse(localStorage.getItem("workouts")) || {};

if (data[selectedDate]) {
  data[selectedDate].forEach(ex => {
    createExercise(ex.name, ex.percent);
  });
} else {
  createExercise();
}
}

// COLORA GIORNI
function colorDays() {
  const data = JSON.parse(localStorage.getItem("workouts")) || {};

  document.querySelectorAll(".day").forEach(day => {
    const d = day.textContent;
    const key = `${year}-${month + 1}-${d}`;

    day.classList.remove("done");

    if (data[key]) {
      day.classList.add("done");
    }
  });
}


// Funzione che ti andra a togliere il pulsante di aggiunta degli esercizi 
  
function updateAddButton() {
  const inputs = exerciseList.querySelectorAll(".percentInput");
  let total = 0;

  inputs.forEach(input => {
    total += parseInt(input.value) || 0;
  });

  const addBtn = document.getElementById("addExercise");
  const saveBtn = document.getElementById("saveWorkout");

  if (total >= 100) {
    addBtn.style.display = "none";
  } else {
    addBtn.style.display = "inline-block";
  }

  // blocca salvataggio se non è 100 preciso
  if (total !== 100) {
    saveBtn.style.background = "gray";
    saveBtn.disabled = true;
  } else {
    saveBtn.style.background = "crimson";
    saveBtn.disabled = false;
  }
}
  
  

// inizializza colori
colorDays();
</script>

</body>
</html>
