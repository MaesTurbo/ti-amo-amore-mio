<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Palestra 💪</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(to bottom, #ff9a9e, #fad0c4);
  text-align: center;
}

.day {
  background: white;
  padding: 15px;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.2s;
}

.day:hover {
  transform: scale(1.1);
}

.day.selected {
  background: crimson;
  color: white;
}

.day.done {
  background: lightgreen;
}

/* MENU (riutilizzato) */
.menu-container {
  position: fixed;
  top: 20px;
  right: 20px;
}

.menu-button {
  background: crimson;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
}

.dropdown {
  opacity: 0;
  transform: translateY(-10px);
  transition: 0.3s;
  pointer-events: none;
  position: absolute;
  right: 0;
  top: 40px;
  background: white;
  border-radius: 8px;
}

.dropdown.show {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}

.dropdown a {
  display: block;
  padding: 10px;
  text-decoration: none;
  color: crimson;
}

/* CONTENUTO */
h1 {
  margin-top: 100px;
  font-size: 3em;
  color: crimson;
}

.exercise {
  background: white;
  margin: 20px auto;
  padding: 20px;
  width: 200px;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.2s;
}

.exercise:hover {
  transform: scale(1.1);
}

  
.container {
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

#calendar {
  margin-top: 30px;
  display: grid;
  grid-template-columns: repeat(7, 80px);
  gap: 10px;
  justify-content: center;
}

.day {
  background: white;
  padding: 20px 0;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.2s;
  text-align: center;
  font-weight: bold;
}

.day:hover {
  transform: scale(1.1);
}

.day.selected {
  background: crimson;
  color: white;
}

.day.done {
  background: lightgreen;
}


#workoutPanel {
  margin-top: 30px;
  background: white;
  padding: 20px;
  border-radius: 12px;
  width: 250px;
  text-align: center;
  box-shadow: 0 0 10px rgba(0,0,0,0.2);
}

.hidden {
  display: none;
}

#workoutPanel input {
  width: 80%;
  margin: 5px 0 10px 0;
  padding: 5px;
}

#saveWorkout {
  background: crimson;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
}

</style>
</head>

<body>


  
<!-- MENU -->
<div class="menu-container">
  <button class="menu-button">☰</button>
  <div class="dropdown">
    <a href="index.html">Home</a>
    <a href="gattini.html">Gattini</a>
    <a href="briscola.html">Briscola</a>
  </div>
</div>

<h1>Alleniamoci insieme 💪❤️</h1>
  
<div class="container">
  <div id="calendar"></div>

  <div id="workoutPanel" class="hidden">
    <h2>Imposta allenamento 💪</h2>

    <label>Glutei (%)</label>
    <input type="number" id="glutei" value="0">

    <label>Schiena (%)</label>
    <input type="number" id="schiena" value="0">

    <label>Riscaldamento (%)</label>
    <input type="number" id="warmup" value="0">

  <button id="saveWorkout">Salva</button>
</div>

</div>
  
  
<script>
const menuBtn = document.querySelector('.menu-button');
const dropdown = document.querySelector('.dropdown');
let selectedDate = null;


menuBtn.addEventListener('click', () => {
  dropdown.classList.toggle('show');
});

document.addEventListener('click', (e) => {
  if (!menuBtn.contains(e.target) && !dropdown.contains(e.target)) {
    dropdown.classList.remove('show');
  }
});

const calendar = document.getElementById("calendar");

const today = new Date();
const year = today.getFullYear();
const month = today.getMonth();

// Numero giorni nel mese
const daysInMonth = new Date(year, month + 1, 0).getDate();

// Giorno della settimana di inizio (0 = domenica)
const firstDay = new Date(year, month, 1).getDay();

// Creo spazi vuoti iniziali
for (let i = 0; i < firstDay; i++) {
  const empty = document.createElement("div");
  calendar.appendChild(empty);
}

colorDays();
  
// Creo i giorni
for (let d = 1; d <= daysInMonth; d++) {
  const day = document.createElement("div");
  day.classList.add("day");
  day.textContent = d;

  const panel = document.getElementById("workoutPanel");

day.addEventListener("click", () => {
  document.querySelectorAll(".day").forEach(el => el.classList.remove("selected"));
  day.classList.add("selected");

  const panel = document.getElementById("workoutPanel");
  panel.classList.remove("hidden");

  selectedDate = `${year}-${month}-${d}`;

  // Carica dati se esistono
  const data = JSON.parse(localStorage.getItem("workouts")) || {};

  if (data[selectedDate]) {
    document.getElementById("glutei").value = data[selectedDate].glutei;
    document.getElementById("schiena").value = data[selectedDate].schiena;
    document.getElementById("warmup").value = data[selectedDate].warmup;
  } else {
    document.getElementById("glutei").value = 0;
    document.getElementById("schiena").value = 0;
    document.getElementById("warmup").value = 0;
  }
});

  calendar.appendChild(day);
}

document.getElementById("saveWorkout").addEventListener("click", () => {
  const g = document.getElementById("glutei").value;
  const s = document.getElementById("schiena").value;
  const w = document.getElementById("warmup").value;

  const data = JSON.parse(localStorage.getItem("workouts")) || {};

  data[selectedDate] = {
    glutei: g,
    schiena: s,
    warmup: w
  };

  localStorage.setItem("workouts", JSON.stringify(data));

  colorDays();

  alert("Allenamento salvato 💪");
});


function colorDays() {
  const data = JSON.parse(localStorage.getItem("workouts")) || {};

  document.querySelectorAll(".day").forEach(day => {
    const d = day.textContent;
    const key = `${year}-${month}-${d}`;

    if (data[key]) {
      day.classList.add("done");
    }
  });
}

</script>

</body>
</html>
