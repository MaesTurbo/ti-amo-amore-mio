<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Palestra 💪</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(to bottom, #ff9a9e, #fad0c4);
  text-align: center;
}

.menu-container {
  position: fixed;
  top: 20px;
  right: 20px;
}

.menu-button {
  background: crimson;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
}

.dropdown {
  opacity: 0;
  transform: translateY(-10px);
  transition: 0.3s;
  pointer-events: none;
  position: absolute;
  right: 0;
  top: 40px;
  background: white;
  border-radius: 8px;
}

.dropdown.show {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}

.dropdown a {
  display: block;
  padding: 10px;
  text-decoration: none;
  color: crimson;
}

h1 {
  margin-top: 100px;
  color: crimson;
}

.container {
  display: flex;
  flex-direction: column;
  align-items: center;
}

#calendar {
  margin-top: 30px;
  display: grid;
  grid-template-columns: repeat(7, 80px);
  gap: 10px;
}

.day {
  background: white;
  padding: 20px 0;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
}

.day.selected {
  background: crimson;
  color: white;
}

.day.done {
  background: lightgreen;
}

#workoutPanel {
  margin-top: 30px;
  background: white;
  padding: 20px;
  border-radius: 10px;
  width: 260px;
}

.hidden {
  display: none;
}

#workoutPanel input {
  width: 80%;
  margin: 5px;
}

button {
  margin-top: 10px;
  padding: 8px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

#saveWorkout {
  background: crimson;
  color: white;
}
</style>
</head>

<body>

<div class="menu-container">
  <button class="menu-button">☰</button>
  <div class="dropdown">
    <a href="index.html">Home</a>
  </div>
</div>

<h1>Alleniamoci insieme 💪❤️</h1>

<div class="container">
  <div id="calendar"></div>

  <div id="workoutPanel" class="hidden">
    <h2>Allenamento</h2>
    <div id="exerciseList"></div>

    <button id="addExercise">+ Aggiungi</button>
    <button id="saveWorkout">Salva</button>
    <button id="resetWorkout">Reset ❌</button>
  </div>
</div>

<script>
const calendar = document.getElementById("calendar");
const exerciseList = document.getElementById("exerciseList");
const categories = [
  "glutei","spalle","schiena","petto","addome",
  "riscaldamento","cardio","corpo libero","yoga","pilates","personalizzata"
];
  

let selectedDate = null;

const today = new Date();
const year = today.getFullYear();
const month = today.getMonth();

// MENU
const menuBtn = document.querySelector('.menu-button');
const dropdown = document.querySelector('.dropdown');

menuBtn.addEventListener('click', () => {
  dropdown.classList.toggle('show');
});

// CREA CALENDARIO
const daysInMonth = new Date(year, month + 1, 0).getDate();
const firstDay = new Date(year, month, 1).getDay();

for (let i = 0; i < firstDay; i++) {
  calendar.appendChild(document.createElement("div"));
}

for (let d = 1; d <= daysInMonth; d++) {
  const day = document.createElement("div");
  day.classList.add("day");
  day.textContent = d;

  day.addEventListener("click", () => {
    document.querySelectorAll(".day").forEach(el => el.classList.remove("selected"));
    day.classList.add("selected");

    selectedDate = `${year}-${month + 1}-${d}`;

    document.getElementById("workoutPanel").classList.remove("hidden");

    loadExercises();
  });

  calendar.appendChild(day);
}


// Funzione per categorie usate

function getUsedCategories() {
  const selects = document.querySelectorAll(".exerciseSelect");
  let used = [];

  selects.forEach(sel => {
    if (sel.value && sel.value !== "personalizzata") {
      used.push(sel.value);
    }
  });

  return used;
}

  
  
// CREA INPUT ESERCIZIO
function createExercise(name = "", percent = 0) {
  const div = document.createElement("div");

  const used = getUsedCategories();

  // SELECT
  const select = document.createElement("select");
  select.classList.add("exerciseSelect");

  categories.forEach(cat => {
    if (!used.includes(cat) || cat === "personalizzata" || cat === name) {
      const option = document.createElement("option");
      option.value = cat;
      option.textContent = cat.charAt(0).toUpperCase() + cat.slice(1);
      select.appendChild(option);
    }
  });

  // INPUT PERSONALIZZATO
  const customInput = document.createElement("input");
  customInput.classList.add("customInput", "hidden");
  customInput.placeholder = "Scrivi tu";

  // INPUT PERCENTUALE
  const percentInput = document.createElement("input");
  percentInput.type = "number";
  percentInput.classList.add("percentInput");
  percentInput.placeholder = "%";
  percentInput.value = percent;

  // EVENTO PERCENTUALE
  percentInput.addEventListener("input", updateAddButton);

  // GESTIONE VALORE SALVATO
  if ([
    "glutei","spalle","schiena","petto","addome",
    "riscaldamento","cardio","corpo libero","yoga","pilates"
  ].includes(name)) {
    select.value = name;
  } else if (name) {
    select.value = "personalizzata";
    customInput.classList.remove("hidden");
    customInput.value = name;
  }

  // CAMBIO SELECT
  select.addEventListener("change", () => {
    updateAllSelects();

    if (select.value === "personalizzata") {
      customInput.classList.remove("hidden");
    } else {
      customInput.classList.add("hidden");
    }
  });

  // AGGIUNTA ELEMENTI
  div.appendChild(select);
  div.appendChild(customInput);
  div.appendChild(percentInput);

  exerciseList.appendChild(div);

  updateAddButton();
}

  document.getElementById("addExercise").addEventListener("click", () => {
    createExercise();
    updateAddButton(); // 🔥 aggiungi anche qui
  });

// SALVA
document.getElementById("saveWorkout").addEventListener("click", () => {
  const inputs = exerciseList.querySelectorAll("div");

  let exercises = [];
  let total = 0;


  
  inputs.forEach(div => {
  const select = div.querySelector(".exerciseSelect");
  const custom = div.querySelector(".customInput");
  const percentInput = div.querySelector(".percentInput");

  let name = select.value;

  if (name === "personalizzata") {
    name = custom.value || "personalizzata";
  }

  const percent = parseInt(percentInput.value) || 0;


    
    total += percent;
    exercises.push({ name, percent });
  });

  if (total > 100) {
    alert("Superi il 100%");
    return;
  }

  const data = JSON.parse(localStorage.getItem("workouts")) || {};
  data[selectedDate] = exercises;
  

  localStorage.setItem("workouts", JSON.stringify(data));

  colorDays();

  alert("Salvato 💪");
});

// RESET
document.getElementById("resetWorkout").addEventListener("click", () => {
  if (!selectedDate) return;

  const data = JSON.parse(localStorage.getItem("workouts")) || {};
  delete data[selectedDate];

  localStorage.setItem("workouts", JSON.stringify(data));

  exerciseList.innerHTML = "";
  createExercise();

  updateAddButton();
  
  colorDays();

  alert("Reset fatto");
});

// CARICA ESERCIZI
function loadExercises() {
  exerciseList.innerHTML = "";

  const data = JSON.parse(localStorage.getItem("workouts")) || {};

if (data[selectedDate]) {
  data[selectedDate].forEach(ex => {
    createExercise(ex.name, ex.percent);
  });
} else {
  createExercise();
}
  updateAddButton();
}

// COLORA GIORNI
function colorDays() {
  const data = JSON.parse(localStorage.getItem("workouts")) || {};

  document.querySelectorAll(".day").forEach(day => {
    const d = day.textContent;
    const key = `${year}-${month + 1}-${d}`;

    day.classList.remove("done");

    if (data[key]) {
      day.classList.add("done");
    }
  });
}


// Funzione che ti andra a togliere il pulsante di aggiunta degli esercizi 
  
function updateAddButton() {
  const inputs = exerciseList.querySelectorAll(".percentInput");
  let total = 0;

  inputs.forEach(input => {
    total += parseInt(input.value) || 0;
  });

  const addBtn = document.getElementById("addExercise");
  const saveBtn = document.getElementById("saveWorkout");

  if (total >= 100) {
    addBtn.style.display = "none";
  } else {
    addBtn.style.display = "inline-block";
  }

  // blocca salvataggio se non è 100 preciso
  if (total !== 100) {
    saveBtn.style.background = "gray";
    saveBtn.disabled = true;
  } else {
    saveBtn.style.background = "crimson";
    saveBtn.disabled = false;
  }
}


// Funzione per aggiornare tutti i select

  
function updateAllSelects() {
  const allDivs = exerciseList.querySelectorAll("div");

  allDivs.forEach(div => {
    const currentSelect = div.querySelector(".exerciseSelect");
    const currentValue = currentSelect.value;

    const used = getUsedCategories();

    currentSelect.innerHTML = "";

    categories.forEach(cat => {
      if (!used.includes(cat) || cat === "personalizzata" || cat === currentValue) {
        const option = document.createElement("option");
        option.value = cat;
        option.textContent = cat.charAt(0).toUpperCase() + cat.slice(1);
        currentSelect.appendChild(option);
      }
    });

    currentSelect.value = currentValue;
  });
}
  
  
  

// inizializza colori
colorDays();
</script>

</body>
</html>
